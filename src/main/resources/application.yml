spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/fams}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:rashy0207}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
        types:
          print:
            banner: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  cache:
    type: caffeine
    cache-names: dashboardKpis,reports
    caffeine:
      spec: maximumSize=500,expireAfterWrite=${fams.kpi.cache-ttl-seconds:60}s
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${ISSUER_URI:https://ngcloak-production.up.railway.app/realms/fams}

        registration:
          keycloak:
            provider: keycloak
            client_id: ${KEYCLOAK_CLIENT_ID:fams}
            client_secret: ${KEYCLOAK_CLIENT_SECRET:NmHb7M05gGElewCdNgEYCsqggwP4URjS}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    codes:
      ProcessModelIdUnique: PROCESS_MODEL_ID_UNIQUE
      ProcessProcessNameUnique: PROCESS_PROCESS_NAME_UNIQUE
      ValidFileType: VALID_FILE_TYPE
server:
  tomcat:
    max-part-count: '100'

fams:
  kpi:
    # SLA window (seconds): cached dashboard KPIs / reports are never older than this
    # and are refreshed within it. Lower = fresher data, higher = less DB load.
    cache-ttl-seconds: 60

keycloak:
  base-url: ${KEYCLOAK_BASE_URI:https://ngcloak-production.up.railway.app}
  base-realm: fams
  client-id: ${KEYCLOAK_CLIENT_ID:fams}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:NmHb7M05gGElewCdNgEYCsqggwP4URjS}
  realm: fams
  admin-client-id: admin-cli-client
  admin-client-secret: XCuQLauxTDGhjXxRjwu06HZy31m3A4NI

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:fams/assets}
feign:
  client:
    config:
      default:
        connectTimeout: 5000000
        readTimeout: 5000000
        loggerLevel: full
        retryer:
          period: 100
          maxPeriod: 1000
          maxAttempts: 3