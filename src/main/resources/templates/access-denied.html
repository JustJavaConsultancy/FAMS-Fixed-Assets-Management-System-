<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
  <title>Access Denied | JustJava FAMS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#F4F5F7] text-[#151b29] font-[Inter] min-h-screen flex flex-col">
 <!-- Content -->
  <main class="flex-1 flex flex-col items-center justify-center px-6 py-12 text-center">
    <img src="/images/401.png"
         alt="Unauthorized"
         class="w-full max-w-md h-auto select-none" />

    <h1 class="mt-8 text-2xl sm:text-3xl font-bold text-[#151b29]">Access Denied</h1>
    <p class="mt-3 max-w-md text-[#5d5e65] text-sm leading-relaxed">
      You don't have permission to view this page. It is restricted to a different role
      in your organization.
    </p>

    <div th:if="${fromPath}"
         class="mt-5 inline-flex items-center gap-2 rounded-lg bg-[#FDF2F3] border border-[#ffb3af] px-3 py-2 text-sm text-[#930019]">
      <span class="material-symbols-outlined text-base">link</span>
      <span th:text="'Attempted: ' + ${fromPath}" class="font-mono"></span>
    </div>

    <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
      <a th:href="${homeUrl}"
         class="inline-flex items-center justify-center gap-2 rounded-lg bg-[#98001a] hover:bg-[#8F0F1E] text-white font-semibold px-5 py-2.5 text-sm transition-colors w-full sm:w-auto">
        <span class="material-symbols-outlined text-base">dashboard</span>
        Go to my dashboard
      </a>
      <a href="/"
         class="inline-flex items-center justify-center gap-2 rounded-lg border border-[#CBD0D8] hover:bg-[#F4F5F7] text-[#151b29] font-semibold px-5 py-2.5 text-sm transition-colors w-full sm:w-auto">
        <span class="material-symbols-outlined text-base">home</span>
        Home
      </a>
    </div>
  </main>
</body>
</html>
