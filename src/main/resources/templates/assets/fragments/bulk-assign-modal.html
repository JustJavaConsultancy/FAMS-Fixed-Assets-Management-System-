<!-- Bulk Assign Modal Fragment -->
<div th:fragment="bulk-assign-modal" id="bulk-assign-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-60">
    <div class="bg-surface-card rounded-xl max-w-md w-full p-6 overflow-y-auto" role="dialog" aria-modal="true" aria-labelledby="bulkAssignTitle">
        <h3 id="bulkAssignTitle" class="font-section-header text-section-header mb-2">Assign <span id="assign-count">0</span> Selected Assets</h3>
        <div class="max-h-40 overflow-y-auto border border-border-default rounded p-2 mb-4 bg-surface-canvas" id="assign-selected-list"></div>

        <div class="space-y-3">
            <div>
                <label class="text-label-small text-secondary">Assigned To</label>
                <input id="assign-to" type="text" placeholder="Employee name or username" class="w-full h-9 px-3 border rounded bg-surface-canvas">
            </div>
            <div>
                <label class="text-label-small text-secondary">Department</label>
                <select id="assign-department" class="w-full h-9 px-3 border rounded bg-surface-canvas">
                    <option value="">-- Select department --</option>
                    <option th:each="d : ${departments}" th:value="${d.name}" th:text="${d.name}">Dept</option>
                </select>
            </div>
            <div>
                <label class="text-label-small text-secondary">Assignment Date</label>
                <input id="assign-date" type="date" class="w-full h-9 px-3 border rounded bg-surface-canvas" value=""/>
            </div>
            <div>
                <label class="text-label-small text-secondary">Notes (optional)</label>
                <textarea id="assign-notes" rows="3" class="w-full px-3 py-2 border rounded bg-surface-canvas"></textarea>
            </div>
        </div>

        <div id="assign-warnings" class="mt-3 space-y-2"></div>

        <div class="mt-4 flex justify-end gap-3">
            <button id="assign-cancel" class="px-4 py-2 border rounded">Cancel</button>
            <button id="assign-submit" class="px-4 py-2 bg-primary text-on-primary rounded">Assign <span id="assign-submit-count">0</span></button>
        </div>
    </div>
</div>
