<!-- Bulk Transfer Modal Fragment -->
<div th:fragment="bulk-transfer-modal" id="bulk-transfer-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-60">
    <div class="bg-surface-card rounded-xl max-w-md w-full p-6 overflow-y-auto" role="dialog" aria-modal="true" aria-labelledby="bulkTransferTitle">
        <h3 id="bulkTransferTitle" class="font-section-header text-section-header mb-2">Transfer <span id="transfer-count">0</span> Selected Assets</h3>
        <div class="max-h-40 overflow-y-auto border border-border-default rounded p-2 mb-4 bg-surface-canvas" id="transfer-selected-list"></div>

        <div class="space-y-3">
            <div>
                <label class="text-label-small text-secondary">Transfer To - Location</label>
                <input id="transfer-to-location" type="text" data-input-type="text" placeholder="Location" class="w-full h-9 px-3 border rounded bg-surface-canvas">
            </div>
            <div>
                <label class="text-label-small text-secondary">Transfer To - Department</label>
                <select id="transfer-to-department" class="w-full h-9 px-3 border rounded bg-surface-canvas">
                    <option value="">-- Select department --</option>
                    <option th:each="d : ${departments}" th:value="${d.name}" th:text="${d.name}">Dept</option>
                </select>
            </div>
            <div>
                <label class="text-label-small text-secondary">Transfer Date</label>
                <input id="transfer-date" type="date" class="w-full h-9 px-3 border rounded bg-surface-canvas"/>
            </div>
            <div>
                <label class="text-label-small text-secondary">Reason</label>
                <select id="transfer-reason" class="w-full h-9 px-3 border rounded bg-surface-canvas">
                    <option>Redeployment</option>
                    <option>Maintenance</option>
                    <option>Office Relocation</option>
                    <option>Other</option>
                </select>
            </div>
            <div>
                <label class="text-label-small text-secondary">Notes (optional)</label>
                <textarea id="transfer-notes" data-input-type="text" rows="3" class="w-full px-3 py-2 border rounded bg-surface-canvas"></textarea>
            </div>
        </div>

        <div id="transfer-warnings" class="mt-3 space-y-2"></div>

        <div class="mt-4 flex justify-end gap-3">
            <button id="transfer-cancel" class="px-4 py-2 border rounded">Cancel</button>
            <button id="transfer-submit" class="px-4 py-2 bg-primary text-on-primary rounded">Transfer <span id="transfer-submit-count">0</span></button>
        </div>
    </div>
</div>
