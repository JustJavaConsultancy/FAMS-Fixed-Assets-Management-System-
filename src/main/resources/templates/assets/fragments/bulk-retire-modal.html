<!-- Bulk Retire Modal Fragment -->
<div th:fragment="bulk-retire-modal" id="bulk-retire-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-60">
    <div class="bg-surface-card rounded-xl max-w-md w-full p-6 overflow-y-auto" role="dialog" aria-modal="true" aria-labelledby="bulkRetireTitle">
        <h3 id="bulkRetireTitle" class="font-section-header text-section-header mb-2">Retire <span id="retire-count">0</span> Selected Assets</h3>
        <div class="max-h-40 overflow-y-auto border border-border-default rounded p-2 mb-4 bg-surface-canvas" id="retire-selected-list"></div>

        <div class="space-y-3">
            <div>
                <label class="text-label-small text-secondary">Retirement Reason</label>
                <select id="retire-reason" class="w-full h-9 px-3 border rounded bg-surface-canvas">
                    <option>End of Life</option>
                    <option>Damaged Beyond Repair</option>
                    <option>Obsolete</option>
                    <option>Stolen</option>
                    <option>Lost</option>
                    <option>Other</option>
                </select>
            </div>
            <div id="retire-disposal-method-row">
                <label class="text-label-small text-secondary">Disposal Method</label>
                <select id="retire-disposal-method" class="w-full h-9 px-3 border rounded bg-surface-canvas">
                    <option>Auction</option>
                    <option>Donation</option>
                    <option>Scrap</option>
                    <option>Written Off</option>
                    <option>Other</option>
                </select>
            </div>
            <div>
                <label class="text-label-small text-secondary">Retirement Date</label>
                <input id="retire-date" type="date" class="w-full h-9 px-3 border rounded bg-surface-canvas"/>
            </div>
            <div>
                <label class="text-label-small text-secondary">Notes (required, min 20 chars)</label>
                <textarea id="retire-notes" data-input-type="text" rows="4" class="w-full px-3 py-2 border rounded bg-surface-canvas"></textarea>
            </div>
            <div>
                <label class="text-label-small text-secondary">Type RETIRE to confirm</label>
                <input id="retire-confirm" type="text" data-input-type="text" placeholder="Type RETIRE to confirm" class="w-full h-9 px-3 border rounded bg-surface-canvas"/>
            </div>
        </div>

        <div id="retire-warnings" class="mt-3 space-y-2 text-sm"></div>

        <div class="mt-4 flex justify-end gap-3">
            <button id="retire-cancel" class="px-4 py-2 border rounded">Cancel</button>
            <button id="retire-submit" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded" disabled>Retire <span id="retire-submit-count">0</span></button>
        </div>
    </div>
</div>
